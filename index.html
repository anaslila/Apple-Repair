<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Apple Repair 2.0</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; color: #1d1d1f; margin: 0; background-color: #fff; padding-bottom: 100px; }
        header { display: flex; justify-content: center; align-items: center; padding: 15px; background: #000; color: #f5f5f5; font-size: 11px; }
        .logo-img { width: 18px; margin-right: 20px; cursor: pointer; }
        .nav-link { margin: 0 10px; cursor: pointer; opacity: 0.8; }
        
        main { max-width: 980px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        #iphone-repair-section { display: none; text-align: left; max-width: 600px; margin: 0 auto; }
        
        /* Dashboard Icons */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 30px; margin-top: 40px; }
        .item { cursor: pointer; transition: transform 0.3s; }
        .item:hover { transform: scale(1.05); }
        .item img { width: 80px; height: 80px; object-fit: contain; display: block; margin: 0 auto 10px; pointer-events: none; }
        
        /* Search */
        #modelSearch { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #d2d2d7; box-sizing: border-box; }
        #modelList { border: 1px solid #d2d2d7; border-radius: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 20px; display: none; }
        .model-option { padding: 12px; cursor: pointer; border-bottom: 1px solid #f2f2f7; }
        
        /* Repairs */
        .checkbox-label { padding: 12px 0; border-bottom: 1px solid #f2f2f7; display: flex; align-items: center; cursor: pointer; }
        .checkbox-label input { margin-right: 15px; width: 20px; height: 20px; }
        .price-banner { position: fixed; bottom: 0; left: 0; width: 100%; background: #1d1d1f; color: white; padding: 20px; text-align: center; font-size: 18px; font-weight: 600; z-index: 999; box-sizing: border-box; }
    </style>
</head>
<body>

    <header>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS81BBInr22Wsn6cQfFeK9jzGMKmcXuYWTnawLQ-hc3VA&s=10" class="logo-img" onclick="location.reload()">
        <div class="nav-link" onclick="showiPhoneForm()">Repair iPhone</div>
        <div class="nav-link">Repair Mac</div>
        <div class="nav-link">Repair iPad</div>
        <div class="nav-link">Repair Watch</div>
        <div class="nav-link">Repair Airpods</div>
        <div class="nav-link">OS</div>
        <div class="nav-link">Support</div>
    </header>

    <main id="dashboard">
        <img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_content/apple-service-and-repair-banner.image.large_2x.png" style="width:100%; max-width:600px;">
        <h1>Apple Service and Repair</h1>
        <div class="grid">
            <div class="item" onclick="showiPhoneForm()"><img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_navicons/image-grid-iphone-nav_2x.png"><span>iPhone</span></div>
            <div class="item"><img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_navicons/image-grid-macbook-nav_2x.png"><span>Mac Laptops</span></div>
            <div class="item"><img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_navicons/image-grid-ipad-nav_2x.png"><span>iPad</span></div>
            <div class="item"><img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_navicons/image-grid-watch-nav_2x.png"><span>Apple Watch</span></div>
            <div class="item"><img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_navicons/image-grid-airpods-nav_2x.png"><span>Airpods</span></div>
            <div class="item"><img src="https://support.apple.com/content/dam/edam/applecare/images/en_US/psp/psp_navicons/image-grid-more-nav_2x.png"><span>Support</span></div>
        </div>
    </main>

    <main id="iphone-repair-section">
        <h1>iPhone Repair</h1>
        <input type="text" id="modelSearch" placeholder="Search model (e.g. 16, 17, 15)..." onkeyup="filterModels()">
        <div id="modelList"></div>
        <input type="hidden" id="selectedMultiplier" value="1.0">

        <div class="checkbox-group" onchange="calculatePrice()">
<label class="checkbox-label"><input type="checkbox" value="3000"> Battery Repair</label>
<label class="checkbox-label"><input type="checkbox" value="5000"> Display Repair</label>
<label class="checkbox-label"><input type="checkbox" value="1000"> Speaker Repair</label>
<label class="checkbox-label"><input type="checkbox" value="8000"> Mother Board Issue</label>
<label class="checkbox-label"><input type="checkbox" value="2000"> Charging Issue</label>
<label class="checkbox-label"><input type="checkbox" value="1000"> Back Panel Cracked</label>
<label class="checkbox-label"><input type="checkbox" value="1500"> Volume Button Issue</label>
<label class="checkbox-label"><input type="checkbox" value="3500"> Back Camera Issue</label>
<label class="checkbox-label"><input type="checkbox" value="3000"> Front Camera Issue</label>
<label class="checkbox-label"><input type="checkbox" value="5000"> Back Camera Broken</label>
<label class="checkbox-label"><input type="checkbox" value="4000"> Front Camera Broken</label>        </div>
        <div class="price-banner" id="priceDisplay">Total Estimate: ₹0.00</div>
    </main>

    <script>
        const models = [
{n: "iPhone 17 Pro Max", v: 4.5},
{n: "iPhone 17 Pro", v: 4.0},
{n: "iPhone 17", v: 3.5},

{n: "iPhone 16 Pro Max", v: 4.5},
{n: "iPhone 16 Pro", v: 4.0},
{n: "iPhone 16 Plus", v: 3.8},
{n: "iPhone 16", v: 3.5},

{n: "iPhone 15 Pro Max", v: 4.5},
{n: "iPhone 15 Pro", v: 4.0},
{n: "iPhone 15 Plus", v: 3.8},
{n: "iPhone 15", v: 3.5},

{n: "iPhone 14 Pro Max", v: 4.5},
{n: "iPhone 14 Pro", v: 4.0},
{n: "iPhone 14 Plus", v: 3.8},
{n: "iPhone 14", v: 3.5},

{n: "iPhone 13 Pro Max", v: 4.3},
{n: "iPhone 13 Pro", v: 3.9},
{n: "iPhone 13", v: 3.4},
{n: "iPhone 13 Mini", v: 3.2},

{n: "iPhone 12 Pro Max", v: 4.2},
{n: "iPhone 12 Pro", v: 3.8},
{n: "iPhone 12", v: 3.3},
{n: "iPhone 12 Mini", v: 3.0},

{n: "iPhone 11 Pro Max", v: 4.0},
{n: "iPhone 11 Pro", v: 3.6},
{n: "iPhone 11", v: 3.1},

{n: "iPhone XS Max", v: 3.8},
{n: "iPhone XS", v: 3.4},
{n: "iPhone XR", v: 3.0},

{n: "iPhone X", v: 3.0},

{n: "iPhone 8 Plus", v: 2.8},
{n: "iPhone 8", v: 2.5},

{n: "iPhone 7 Plus", v: 2.3},
{n: "iPhone 7", v: 2.0},

{n: "iPhone SE (2022)", v: 2.5},
{n: "iPhone SE (2020)", v: 2.0}        ];

        function filterModels() {
            let val = document.getElementById('modelSearch').value.toLowerCase();
            let list = document.getElementById('modelList');
            list.innerHTML = '';
            if (val.length > 0) {
                list.style.display = 'block';
                models.filter(m => m.n.toLowerCase().includes(val)).forEach(m => {
                    let div = document.createElement('div');
                    div.className = 'model-option';
                    div.innerText = m.n;
                    div.onclick = () => {
                        document.getElementById('modelSearch').value = m.n;
                        document.getElementById('selectedMultiplier').value = m.v;
                        list.style.display = 'none';
                        calculatePrice();
                    };
                    list.appendChild(div);
                });
            } else { list.style.display = 'none'; }
        }

        function calculatePrice() {
            let mult = parseFloat(document.getElementById('selectedMultiplier').value);
            let total = 0;
            document.querySelectorAll('.checkbox-group input:checked').forEach(cb => total += parseFloat(cb.value));
            document.getElementById('priceDisplay').innerText = "Total Estimate: ₹" + (total * mult).toFixed(2);
        }

        function showiPhoneForm() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('iphone-repair-section').style.display = 'block';
        }
    </script>
</body>
</html>
